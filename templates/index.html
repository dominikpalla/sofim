<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOFIM - Studijní asistent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-text">
                <h1><span class="brand-symbol">{=}</span> SOFIM Asistent</h1>
                <p>Studijní oddělení FIM UHK</p>
            </div>
        </div>

        <div class="warning-banner">
            <i class="fas fa-info-circle"></i> <span>
                Toto je testovací verze. Chatbot se stále učí a může dělat chyby.
                Našli jste nepřesnost? <a href="https://forms.gle/21QGh33wDoACydZC8" target="_blank" class="feedback-link">Dejte nám vědět</a>.
            </span>
        </div>

        <div class="chat-messages" id="chat-box">
            <div class="message bot">
                <div class="msg-content">
                    Ahoj! Jsem SOFIM, tvůj virtuální asistent. 🦉<br>
                    S čím ti mohu dnes pomoci ohledně studia?
                </div>
            </div>

            <div class="typing-indicator" id="loading" style="display: none;">
                <span></span><span></span><span></span>
            </div>
        </div>

        <form class="chat-input-area" id="chat-form">
            <input type="text" id="user-input" placeholder="Napiš zprávu..." autocomplete="off" required>
            <button type="submit">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loadingIndicator = document.getElementById('loading');

        // --- Funkce: Převod Markdown na HTML ---
        function parseMarkdown(text) {
    if (!text) return "";

    // 1. Odkazy (včetně mailto): [text](url) -> <a href="url" target="_blank">text</a>
    let formatted = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

    // 2. Tučné písmo: **text** -> <strong>text</strong>
    formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    // 3. Kurzíva: *text* -> <em>text</em>
    formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');

    // 4. Odrážky: "- text" -> "• text" (pro hezčí seznamy)
    formatted = formatted.replace(/^- (.*)/gm, '• $1');

    // 5. Nové řádky: \n -> <br>
    formatted = formatted.replace(/\n/g, '<br>');

    return formatted;
}

        let chatHistory = [];

        // --- Hlavní odesílací smyčka ---
        form.addEventListener('submit', async function(e) {
            e.preventDefault(); // Zabráníme refreshnutí stránky

            const message = userInput.value.trim();
            if (!message) return;

            // 1. Přidat zprávu uživatele
            // Uživatelův vstup nemusíme formátovat jako markdown, jen nové řádky
            addMessage(message.replace(/\n/g, '<br>'), 'user');
            userInput.value = '';

            // 2. Zobrazit "loading"
            loadingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                // 3. Odeslání na server (AJAX)
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: message, history: chatHistory })
                });

                const data = await response.json();

                // 4. Skrýt loading a zobrazit odpověď
                loadingIndicator.style.display = 'none';

                if (data.response) {

                    chatHistory.push({ role: 'user', content: message });
                    chatHistory.push({ role: 'assistant', content: data.response });

                    // Formátování odpovědi (Markdown -> HTML)
                    const formattedResponse = parseMarkdown(data.response);

                    // Přidání zprávy i se zdroji
                    addMessage(formattedResponse, 'bot', data.sources);
                } else {
                    addMessage("Omlouvám se, nastala chyba spojení.", 'bot');
                }

            } catch (error) {
                loadingIndicator.style.display = 'none';
                addMessage("Chyba: Nepodařilo se kontaktovat server.", 'bot');
                console.error(error);
            }
        });

        // --- Funkce pro přidání bubliny do chatu ---
        function addMessage(htmlContent, sender, sources = []) {
            const div = document.createElement('div');
            div.classList.add('message', sender);

            // Obalíme obsah zprávy
            let innerHTML = `<div class="msg-content">${htmlContent}</div>`;

            // Pokud je to bot a má zdroje, přidáme patičku s ikonkami
            if (sender === 'bot' && sources && sources.length > 0) {
                innerHTML += `<div class="sources-container">`;
                sources.forEach(sourceObj => {
                    // Backend teď vrací objekty: { name: "...", url: "..." }
                    const sourceName = sourceObj.name;
                    const sourceUrl = sourceObj.url;

                    if (sourceUrl && sourceUrl.trim() !== "") {
                        // Pokud máme URL, uděláme proklikávací odkaz
                        innerHTML += `
                            <a href="${sourceUrl}" target="_blank" class="source-item" data-tooltip="${sourceName}" style="text-decoration: none; color: inherit;">
                                <i class="fas fa-external-link-alt"></i> <span>Zdroj</span>
                            </a>
                        `;
                    } else {
                        // Pokud URL nemáme (např. export ze STAGu), uděláme obyčejný div
                        innerHTML += `
                            <div class="source-item" data-tooltip="${sourceName}">
                                <i class="far fa-file-alt"></i> <span>Zdroj</span>
                            </div>
                        `;
                    }
                });
                innerHTML += `</div>`;
            }

            div.innerHTML = innerHTML;

            // Vložíme PŘED indikátor načítání
            chatBox.insertBefore(div, loadingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

</body>
</html>
